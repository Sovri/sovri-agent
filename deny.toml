# cargo-deny configuration. Mirrors the org supply-chain posture (ADR-012):
# deny known-vulnerable / yanked crates and disallow copyleft licenses.
[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
  "Apache-2.0",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MPL-2.0",
  "CC0-1.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# The agent pins the first-party SDK by git tag (path in dev, tag in CI).
allow-git = ["https://github.com/Sovri/sovri-sdk-rust"]
