[package]
name = "sovri-agent"
version = "0.0.0"
edition = "2021"
rust-version = "1.80"
license = "Apache-2.0"
description = "Sovri compliance agent — air-gapped rule execution (placeholder)."
repository = "https://github.com/Sovri/sovri-agent"
readme = "README.md"
publish = false

[[bin]]
name = "sovri-agent"
path = "src/main.rs"

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
